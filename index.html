<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Відкриття сайту</title>
    <style>
        /* Основні стилі сторінки */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            background: #f0f2f5; 
            text-align: center; 
            color: #1c1e21;
            overflow: hidden; /* Заборона скролу при оверлеї */
        }
        .card { 
            padding: 30px; 
            background: white; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.08); 
            max-width: 320px; 
            width: 90%;
            position: relative;
            z-index: 1;
        }
        h3 { margin-top: 0; margin-bottom: 10px; font-size: 1.4em; }
        p { font-size: 1em; color: #4b4b4b; line-height: 1.4; margin-bottom: 0; }
        
        /* Стилі кнопки */
        .btn { 
            display: block; 
            padding: 15px 20px; 
            background: #0088cc; 
            color: white !important; 
            text-decoration: none; 
            border-radius: 12px; 
            font-weight: 600; 
            margin-top: 25px;
            cursor: pointer;
            border: none;
            width: 100%;
            font-size: 1em;
            transition: background 0.3s;
        }
        .btn:active { background: #006699; }

        /* Стилі для оверлею (стрілка та підказка для iOS) */
        #ios-overlay {
            display: none; /* Приховано за замовчуванням */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            z-index: 100;
            pointer-events: auto; /* Дозволяємо кліки, щоб закрити */
        }

        /* Велика стрілка вгору-вправо */
        .arrow {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 60px;
            line-height: 1;
            animation: bounce 1s infinite;
        }

        /* Текст інструкції на оверлеї */
        .instruction {
            position: absolute;
            top: 80px;
            right: 20px;
            left: 20px;
            font-size: 1.2em;
            line-height: 1.5;
            text-align: right;
            font-weight: 500;
        }
        .instruction b { color: #55ceff; }

        /* Анімація стрілки */
        @keyframes bounce {
            0%, 100% { transform: translateY(0) translateX(0); }
            50% { transform: translateY(-10px) translateX(5px); }
        }
    </style>
</head>
<body>

<div class="card" id="main-card">
    <h3>Відкриваємо сайт...</h3>
    <p id="status-text">На Android сайт має відкритися автоматично.</p>
    
    <button id="open-link" class="btn">ПЕРЕЙТИ ДО САЙТУ</button>
</div>

<div id="ios-overlay" onclick="hideOverlay()">
    <div class="arrow">↗</div>
    <div class="instruction">
        Натисніть сюди <b>(⋯)</b><br>
        та оберіть<br>
        <b>«Відкрити у браузері»</b>
    </div>
</div>

<script>
    // === КОНФІГУРАЦІЯ ===
    // Повне посилання
    const fullTargetUrl = "https://cloud.uislab.com/ords/f?p=2900:LOGIN_DESKTOP::::::"; 
    // Тільки домен і шлях для Intent (без https://)
    const cleanUrl = "cloud.uislab.com/ords/f?p=2900:LOGIN_DESKTOP::::::";
    // ===================

    const isAndroid = /Android/i.test(navigator.userAgent);
    const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
    
    const openBtn = document.getElementById('open-link');
    const statusText = document.getElementById('status-text');
    const iosOverlay = document.getElementById('ios-overlay');

    function hideOverlay() {
        iosOverlay.style.display = 'none';
    }

    window.onload = function() {
        if (isAndroid) {
            statusText.innerText = "Спробуємо відкрити сайт автоматично...";
            
            // Спеціальний формат Intent для складних URL
            const intentUrl = `intent://${cleanUrl}#Intent;scheme=https;action=android.intent.action.VIEW;package=com.android.chrome;end`;
            // Якщо Chrome немає, спробуємо загальний браузер:
            const fallbackIntent = `intent://${cleanUrl}#Intent;scheme=https;action=android.intent.action.VIEW;end`;

            const tryOpen = () => {
                // Намагаємося відкрити спочатку через Chrome
                window.location.href = intentUrl;
                // Якщо через 2 секунди ми все ще тут - пробуємо загальний редирект
                setTimeout(() => {
                    window.location.href = fallbackIntent;
                }, 2000);
            };

            openBtn.onclick = tryOpen;
            setTimeout(tryOpen, 500);

        } else if (isIOS) {
            statusText.innerText = "Telegram обмежує роботу сайтів.";
            openBtn.innerText = "ЯК ВІДКРИТИ";
            openBtn.onclick = function(e) {
                e.preventDefault();
                iosOverlay.style.display = 'block';
            };
        } else {
            statusText.innerText = "Натисніть кнопку нижче.";
            openBtn.onclick = function() {
                window.location.href = fullTargetUrl;
            };
        }
    };
</script>

</body>
</html>
