<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Переход в браузер</title>
    <style>
        body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f4f4f9; text-align: center; }
        .card { padding: 20px; background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 300px; }
        .btn { display: inline-block; padding: 12px 24px; background: #0088cc; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; margin-top: 20px; }
        .hint { font-size: 0.9em; color: #666; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h3>Почти готово!</h3>
    <p>Для стабильной работы откройте сайт в основном браузере</p>
    
    <a href="https://cloud.uislab.com/ords/f?p=2900:LOGIN_DESKTOP::::::" id="open-link" class="btn">ОТКРЫТЬ САЙТ</a>

    <div class="hint">
        Если сайт не открылся:<br>
        <b>Нажмите ⋮ или ⋯</b><br>
        и выберите <b>"Открыть в браузере"</b>
    </div>
</div>

<script>
    const targetUrl = "cloud.uislab.com/ords/f?p=2900:LOGIN_DESKTOP::::::"; // Вставь сюда адрес нужного сайта (без https://)

    function tryRedirect() {
        const isAndroid = /Android/i.test(navigator.userAgent);
        
        if (isAndroid) {
            // Пытаемся принудительно вызвать Chrome на Android
            const intentUrl = `intent://${targetUrl}#Intent;scheme=https;package=com.android.chrome;end`;
            window.location.href = intentUrl;
        } else {
            // На iOS просто меняем ссылку на кнопке на обычную
            document.getElementById('open-link').href = "https://" + targetUrl;
        }
    }

    // Запускаем попытку сразу при загрузке
    window.onload = tryRedirect;
</script>

</body>
</html>
